services:
  zyra-server:
    build: ./server
    ports:
      - "8765:8765"
    volumes:
      - ./_work:/data
    env_file:
      - .env
    environment:
      - ZYRA_VERBOSITY=debug
      - ZYRA_DATA_DIR=/data
      # LLM provider keys — configured via .env

  zyra-editor:
    build:
      context: .
      dockerfile: Dockerfile.editor
    ports:
      - "5173:5173"
    environment:
      - VITE_BACKEND_URL=http://zyra-server:8765
      - VITE_USE_POLLING=1
    volumes:
      - ./packages/core/src:/app/packages/core/src
      - ./packages/editor/src:/app/packages/editor/src
      - ./packages/editor/index.html:/app/packages/editor/index.html
      - ./packages/editor/vite.config.ts:/app/packages/editor/vite.config.ts
    depends_on:
      - zyra-server
