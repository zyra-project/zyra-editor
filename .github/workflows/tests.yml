name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── Frontend (TypeScript) ────────────────────────────────────────────────────
  frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20.19
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @zyra/core
        run: pnpm --filter @zyra/core build

      - name: Run @zyra/core tests
        run: pnpm --filter @zyra/core test

      - name: Run @zyra/editor tests
        run: pnpm --filter @zyra/editor test

  # ── Type checking (informational — pre-existing errors tracked separately) ───
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    continue-on-error: true   # pre-existing implicit-any debt in @zyra/editor

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20.19
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @zyra/core (required for editor type resolution)
        run: pnpm --filter @zyra/core build

      - name: Type check all packages
        run: pnpm typecheck

  # ── Backend (Python) ─────────────────────────────────────────────────────────
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pytest -r server/requirements.txt

      - name: Run tests
        run: pytest server/tests/ -v
