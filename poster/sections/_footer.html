
</div><!-- /.presentation -->

<script>
(function() {
  // ── Scroll-triggered fade-in ──
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
      }
    });
  }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });

  document.querySelectorAll('.fade-in').forEach(function(el) {
    observer.observe(el);
  });

  // ── Presentation Timer ──
  (function() {
    var timer = document.getElementById('presTimer');
    var display = document.getElementById('timerDisplay');
    var startStopBtn = document.getElementById('timerStartStop');
    var resetBtn = document.getElementById('timerReset');
    var toggleBtn = document.getElementById('timerToggle');
    if (!timer || !display || !startStopBtn || !resetBtn || !toggleBtn) return;

    var elapsed = 0;      // seconds
    var interval = null;
    var running = false;

    // Create reopen tab
    var tab = document.createElement('button');
    tab.type = 'button';
    tab.className = 'pres-timer-tab';
    tab.textContent = '\u23f1 Timer';
    tab.title = 'Show timer';
    tab.setAttribute('aria-label', 'Show timer');
    document.body.appendChild(tab);

    function pad(n) { return n < 10 ? '0' + n : '' + n; }

    function render() {
      var m = Math.floor(elapsed / 60);
      var s = elapsed % 60;
      display.textContent = pad(m) + ':' + pad(s);
      // Warning at 4 min, overtime at 5 min
      display.classList.toggle('warning', elapsed >= 240 && elapsed < 300);
      display.classList.toggle('overtime', elapsed >= 300);
    }

    function start() {
      if (running) return;
      running = true;
      startStopBtn.innerHTML = '\u275A\u275A'; // pause icon
      startStopBtn.title = 'Pause';
      interval = setInterval(function() { elapsed++; render(); }, 1000);
    }

    function pause() {
      running = false;
      startStopBtn.innerHTML = '\u25B6'; // play icon
      startStopBtn.title = 'Start';
      clearInterval(interval);
    }

    startStopBtn.addEventListener('click', function() {
      running ? pause() : start();
    });

    resetBtn.addEventListener('click', function() {
      pause();
      elapsed = 0;
      render();
    });

    toggleBtn.addEventListener('click', function() {
      timer.classList.add('hidden');
      tab.classList.add('visible');
    });

    tab.addEventListener('click', function() {
      timer.classList.remove('hidden');
      tab.classList.remove('visible');
    });

    render();
  })();

  // ── Demo URL resolution ──
  // window.__DEMO_URL__ is injected at build time via --demo-url / DEMO_URL env var.
  // If empty, auto-detect: localhost/file:// → localhost:5173, otherwise skip probing
  // and show the screenshot fallback immediately.
  var explicitUrl = (window.__DEMO_URL__ || '').trim();
  var isLocal = location.protocol === 'file:'
    || location.hostname === 'localhost'
    || location.hostname === '127.0.0.1';
  var demoUrl = explicitUrl
    || (isLocal ? 'http://localhost:5173' : '');

  // ── Editor iframe fallback ──
  var iframe = document.getElementById('editorFrame');
  var fallback = document.getElementById('demoFallback');
  var fallbackText = document.getElementById('demoFallbackText');
  var screenshot = document.getElementById('demoScreenshot');
  var urlDisplay = document.getElementById('demoUrlDisplay');

  if (!iframe || !fallback) return; // demo section not present

  var loaded = false;

  // Pre-check if the screenshot image exists
  var screenshotAvailable = false;
  if (screenshot) {
    var testImg = new Image();
    testImg.onload = function() { screenshotAvailable = true; };
    testImg.src = screenshot.src;
  }

  function showFallback() {
    if (loaded) return;
    iframe.style.display = 'none';
    fallback.classList.add('active');
    // Show screenshot if available, otherwise show text instructions
    if (screenshotAvailable && screenshot) {
      screenshot.style.display = 'block';
      if (fallbackText) fallbackText.style.display = 'none';
    } else {
      if (screenshot) screenshot.style.display = 'none';
      if (fallbackText) fallbackText.style.display = '';
    }
  }

  function showEditor() {
    if (loaded) return;
    loaded = true;
    iframe.style.display = 'block';
    fallback.classList.remove('active');
  }

  // If no demo URL resolved (non-local, no explicit DEMO_URL), skip probing
  // and go straight to the screenshot/text fallback.
  if (!demoUrl) {
    showFallback();
    return;
  }

  // Set the iframe src and title bar URL display
  iframe.src = demoUrl;
  if (urlDisplay) {
    try {
      var urlObj = new URL(demoUrl);
      urlDisplay.textContent = urlObj.host + ' \u2014 Zyra Editor';
    } catch(e) {
      urlDisplay.textContent = demoUrl + ' \u2014 Zyra Editor';
    }
  }

  function checkEditor() {
    var healthUrl = demoUrl.replace(/\/+$/, '') + '/health';
    fetch(healthUrl)
      .then(function(response) {
        if (response.ok) {
          showEditor();
        } else {
          showFallback();
        }
      })
      .catch(function() {
        showFallback();
      });
  }

  iframe.addEventListener('error', function() {
    showFallback();
  });

  // Only the /health check gates the loaded flag (via showEditor).
  // The iframe load event is not used because it fires for error pages too.
  setTimeout(checkEditor, 1500);
  // Retry periodically in case the server starts later
  var retryCount = 0;
  var retryInterval = setInterval(function() {
    if (loaded || retryCount > 10) {
      clearInterval(retryInterval);
      return;
    }
    retryCount++;
    checkEditor();
  }, 3000);
})();
</script>

</body>
</html>
